<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CS Luxury Company</title>
  <style>
    body {
      margin: 0;
      background-color: #3b0a1a;
      color: #d4af37;
      font-family: 'Georgia', serif;
      text-align: center;
    }

    h1 {
      padding: 30px;
      font-size: 42px;
      letter-spacing: 3px;
    }

    section {
      padding: 60px 20px;
    }

    .card {
      border: 1px solid #d4af37;
      margin: 10px;
      padding: 20px;
      display: inline-block;
    }

    /* BOTÓN LUXURY */
    .btn-luxury {
      display: inline-block;
      margin-top: 30px;
      padding: 15px 35px;
      background: transparent;
      color: #d4af37;
      border: 1px solid #d4af37;
      text-decoration: none;
      font-size: 16px;
      letter-spacing: 1px;
      transition: all 0.3s ease;
    }

    .btn-luxury:hover {
      background: #d4af37;
      color: #3b0a1a;
    }
  </style>
</head>

<body>

<h1>CS LUXURY COMPANY</h1>

<section>
  <h2>Timeless Elegance</h2>
  <p>Luxury, simplicity and old money aesthetics.</p>

  <a href="#" class="btn-luxury">Discover More</a>
</section>

<section>
  <h2>Collections</h2>
  <div class="card">Minimal Classics</div>
  <div class="card">Old Money Essentials</div>
  <div class="card">Luxury Basics</div>
</section>

<section>
  <h2>Contact</h2>
  <p>contact@csluxurycompany.com</p>
</section>

</body>
</html>
